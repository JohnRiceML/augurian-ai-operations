# Pre-commit hooks for Augurian AI Operations.
#
# First-time setup:
#   pip install pre-commit
#   pre-commit install
#
# These run on every `git commit`. If they fail, fix the underlying issue
# rather than passing --no-verify. Hooks fail for reasons.

repos:
  # Generic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # Block accidentally-committed secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            \.gitmessage|
            \.claude/agents/secret-scanner\.md|
            \.claude/skills/git-safety/SKILL\.md
          )$

  # Python: lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Block files that should never be committed (defense in depth — .gitignore
  # already excludes these, but a malicious or careless `git add -f` would
  # bypass that).
  - repo: local
    hooks:
      - id: forbid-secrets-paths
        name: refuse to commit secrets/credentials paths
        entry: >
          bash -c '
          for f in "$@"; do
            case "$f" in
              .env|.env.local|.env.production|credentials/*|service-account-*.json|*.json.key|*.pem|*.p12|*.pfx|audit-local/*|pipelines/clients.yaml)
                echo "REFUSED: $f matches a forbidden pattern. See .gitignore.";
                exit 1;
                ;;
            esac
          done
          '
        language: system
        pass_filenames: true
