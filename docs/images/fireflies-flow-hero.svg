<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">How a Fireflies call becomes a verified answer in Slack</title>
  <desc id="desc">A horizontal flow: Fireflies records the call, OpenAI Whisper transcribes the audio, the file lands in Google Drive, Claude extracts structured commitments and writes them to a labeled index, a user asks a question in Slack, Claude reads the index and replies, and an Augurian account lead verifies the answer before it informs a status meeting.</desc>

  <defs>
    <!-- Subtle drop shadow for cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Marker for arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6F7A"/>
    </marker>

    <style>
      .bg          { fill: #FAF6EE; }
      .title-text  { font: 700 32px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #1F2937; }
      .subtitle    { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #4B5563; letter-spacing: 0.6px; }
      .card-name   { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #FFFFFF; }
      .card-action { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #FFFFFF; opacity: 0.9; }
      .card-detail { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #FFFFFF; opacity: 0.75; }
      .arrow-label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #5B6F7A; letter-spacing: 0.4px; text-transform: uppercase; }
      .step-num    { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #FFFFFF; opacity: 0.6; letter-spacing: 0.8px; }
      .callout     { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #1F2937; }
      .callout-q   { font: italic 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #1F2937; }
      .callout-a   { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #4B5563; }
      .badge       { font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; fill: #FFFFFF; letter-spacing: 1px; }

      /* Dark-mode friendly: the background tint is pale enough that GitHub's dark theme looks OK,
         but text is forced to dark for readability on the cream */
      @media (prefers-color-scheme: dark) {
        .bg          { fill: #1A1612; }
        .title-text  { fill: #F5F0E8; }
        .subtitle    { fill: #BFB8AA; }
        .arrow-label { fill: #BFB8AA; }
        .callout     { fill: #F5F0E8; }
        .callout-q   { fill: #F5F0E8; }
        .callout-a   { fill: #BFB8AA; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1400" height="720"/>

  <!-- Title block -->
  <text x="700" y="58" class="title-text" text-anchor="middle">How a Fireflies call becomes a verified answer</text>
  <text x="700" y="86" class="subtitle" text-anchor="middle">THE MOST IMPORTANT FLOW IN AUGURIAN'S AI OPS</text>

  <!-- Decorative accent line under subtitle -->
  <line x1="600" y1="104" x2="800" y2="104" stroke="#E8964D" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stage cards. 7 cards, evenly spaced. Card width 160, gap ~30. -->
  <!-- Y center for cards: ~ 240 (top of card 160, bottom 320) -->

  <!-- ============ CARD 1: Fireflies ============ -->
  <g transform="translate(50, 160)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="#F35F73"/>
    <text x="20" y="28" class="step-num">STEP 01</text>
    <!-- Icon: stylized phone/microphone glyph -->
    <g transform="translate(60, 50)">
      <circle cx="20" cy="20" r="20" fill="#FFFFFF" opacity="0.18"/>
      <path d="M20 8 L20 26 M14 22 a8 8 0 0 0 12 0 M20 30 L20 36 M14 36 L26 36" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="80" y="124" class="card-name" text-anchor="middle">Fireflies.ai</text>
    <text x="80" y="146" class="card-action" text-anchor="middle">Records the call</text>
    <text x="80" y="166" class="card-detail" text-anchor="middle">Auto-captures audio +</text>
    <text x="80" y="180" class="card-detail" text-anchor="middle">drops .mp3 in Drive</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="218" y1="250" x2="262" y2="250" stroke="#5B6F7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="240" class="arrow-label" text-anchor="middle">audio</text>

  <!-- ============ CARD 2: Whisper ============ -->
  <g transform="translate(270, 160)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="#6F42C1"/>
    <text x="20" y="28" class="step-num">STEP 02</text>
    <!-- Icon: stylized waveform -->
    <g transform="translate(40, 56)">
      <path d="M5 20 L5 14 L5 26 M15 20 L15 8 L15 32 M25 20 L25 12 L25 28 M35 20 L35 16 L35 24 M45 20 L45 4 L45 36 M55 20 L55 14 L55 26 M65 20 L65 12 L65 28 M75 20 L75 16 L75 24" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    </g>
    <text x="80" y="124" class="card-name" text-anchor="middle">OpenAI Whisper</text>
    <text x="80" y="146" class="card-action" text-anchor="middle">Transcribes audio</text>
    <text x="80" y="166" class="card-detail" text-anchor="middle">Speaker labels +</text>
    <text x="80" y="180" class="card-detail" text-anchor="middle">timestamp anchors</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="438" y1="250" x2="482" y2="250" stroke="#5B6F7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="240" class="arrow-label" text-anchor="middle">text</text>

  <!-- ============ CARD 3: Google Drive (raw) ============ -->
  <g transform="translate(490, 160)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="#4285F4"/>
    <text x="20" y="28" class="step-num">STEP 03</text>
    <!-- Icon: stylized drive/folder -->
    <g transform="translate(50, 50)">
      <path d="M5 30 L20 5 L40 5 L55 30 Z" fill="#FFFFFF" opacity="0.25"/>
      <path d="M5 30 L60 30 L45 5 L20 5 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    <text x="80" y="124" class="card-name" text-anchor="middle">Google Drive</text>
    <text x="80" y="146" class="card-action" text-anchor="middle">Lands in /raw/firefly/</text>
    <text x="80" y="166" class="card-detail" text-anchor="middle">Per-client folder</text>
    <text x="80" y="180" class="card-detail" text-anchor="middle">audit-of-record</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="658" y1="250" x2="702" y2="250" stroke="#5B6F7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680" y="240" class="arrow-label" text-anchor="middle">trigger</text>

  <!-- ============ CARD 4: Claude (extractor) ============ -->
  <g transform="translate(710, 160)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="#C97B45"/>
    <text x="20" y="28" class="step-num">STEP 04</text>
    <!-- Icon: stylized "extract" mark — small dots being collected -->
    <g transform="translate(48, 50)">
      <circle cx="10" cy="10" r="3" fill="#FFFFFF" opacity="0.7"/>
      <circle cx="30" cy="6" r="3" fill="#FFFFFF" opacity="0.7"/>
      <circle cx="50" cy="14" r="3" fill="#FFFFFF" opacity="0.7"/>
      <circle cx="20" cy="22" r="3" fill="#FFFFFF" opacity="0.7"/>
      <circle cx="42" cy="26" r="3" fill="#FFFFFF" opacity="0.7"/>
      <path d="M30 36 L30 30 M22 36 L38 36 L34 42 L26 42 Z" stroke="#FFFFFF" stroke-width="2" fill="#FFFFFF" opacity="0.9"/>
    </g>
    <text x="80" y="124" class="card-name" text-anchor="middle">Claude (Anthropic)</text>
    <text x="80" y="146" class="card-action" text-anchor="middle">Extracts commitments</text>
    <text x="80" y="166" class="card-detail" text-anchor="middle">Deliverables, action items,</text>
    <text x="80" y="180" class="card-detail" text-anchor="middle">decisions, blockers</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="878" y1="250" x2="922" y2="250" stroke="#5B6F7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="240" class="arrow-label" text-anchor="middle">JSON</text>

  <!-- ============ CARD 5: Drive (indexed) ============ -->
  <g transform="translate(930, 160)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="#1A73E8"/>
    <text x="20" y="28" class="step-num">STEP 05</text>
    <!-- Icon: stack of structured records -->
    <g transform="translate(50, 50)">
      <rect x="0" y="2" width="60" height="6" rx="2" fill="#FFFFFF" opacity="0.7"/>
      <rect x="0" y="14" width="50" height="6" rx="2" fill="#FFFFFF" opacity="0.7"/>
      <rect x="0" y="26" width="55" height="6" rx="2" fill="#FFFFFF" opacity="0.7"/>
      <rect x="0" y="38" width="45" height="6" rx="2" fill="#FFFFFF" opacity="0.7"/>
    </g>
    <text x="80" y="124" class="card-name" text-anchor="middle">/commitments/</text>
    <text x="80" y="146" class="card-action" text-anchor="middle">Indexed JSONL</text>
    <text x="80" y="166" class="card-detail" text-anchor="middle">Append-only,</text>
    <text x="80" y="180" class="card-detail" text-anchor="middle">queryable in ms</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="1098" y1="250" x2="1142" y2="250" stroke="#5B6F7A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1120" y="240" class="arrow-label" text-anchor="middle">query</text>

  <!-- ============ CARD 6: Slack ============ -->
  <g transform="translate(1150, 160)" filter="url(#cardShadow)">
    <rect width="200" height="180" rx="14" fill="#4A154B"/>
    <text x="20" y="28" class="step-num">STEP 06 — ANSWER</text>
    <!-- Icon: stylized chat bubbles -->
    <g transform="translate(70, 50)">
      <rect x="0" y="0" width="32" height="20" rx="6" fill="#FFFFFF" opacity="0.85"/>
      <rect x="20" y="22" width="36" height="20" rx="6" fill="#E8964D" opacity="0.95"/>
    </g>
    <text x="100" y="124" class="card-name" text-anchor="middle">Slack + Account lead</text>
    <text x="100" y="146" class="card-action" text-anchor="middle">Asks → verifies → ships</text>
    <text x="100" y="166" class="card-detail" text-anchor="middle">Human reviews answer</text>
    <text x="100" y="180" class="card-detail" text-anchor="middle">before it leaves Augurian</text>
    <!-- "human-reviewed" tag -->
    <rect x="20" y="50" width="60" height="14" rx="7" fill="#E8964D"/>
    <text x="50" y="60" class="badge" text-anchor="middle">HUMAN ✓</text>
  </g>

  <!-- ============ CALLOUT BOX: Example query ============ -->
  <g transform="translate(80, 410)">
    <rect width="1240" height="220" rx="16" fill="#FFFFFF" opacity="0.7" stroke="#E8964D" stroke-width="2"/>

    <text x="40" y="48" class="callout" font-weight="700">Example — A partner prepping for a status meeting:</text>

    <!-- Question -->
    <g transform="translate(40, 70)">
      <rect width="14" height="14" rx="4" fill="#4A154B"/>
      <text x="14" y="11" class="badge" text-anchor="middle">Q</text>
      <text x="32" y="12" class="callout-q">"What were the top deliverables for Coborn's for next month?"</text>
    </g>

    <!-- Answer -->
    <g transform="translate(40, 110)">
      <rect width="14" height="14" rx="4" fill="#E8964D"/>
      <text x="14" y="11" class="badge" text-anchor="middle">A</text>
      <text x="32" y="12" class="callout-a">Top 5 open deliverables for Coborn's, due 2026-06-01 to 2026-06-30, sorted by priority:</text>
    </g>

    <text x="62" y="138" class="callout-a">1.  Q3 SEO brief — due Jun 4, owner: Sarah, captured in May 4 monthly review @ 14:32</text>
    <text x="62" y="158" class="callout-a">2.  Spring Saver paid pacing review — due Jun 10, captured in May 11 status call @ 22:18</text>
    <text x="62" y="178" class="callout-a">3.  Curbside landing page redesign brief — due Jun 14, captured in May 4 monthly review @ 31:05</text>

    <text x="40" y="206" class="callout-a" font-style="italic" opacity="0.85">No vector DB. No fuzzy search. Just labeled extraction + a flat index — answers in milliseconds.</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="80" y1="680" x2="1320" y2="680" stroke="#E8964D" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <text x="700" y="700" class="subtitle" text-anchor="middle" style="font-size: 12px; letter-spacing: 1px;">AUGURIAN AI OPERATIONS · DRAFTER PATTERN · NEVER PUBLISHER</text>
</svg>
